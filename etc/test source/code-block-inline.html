<!DOCTYPE html>

  <title>코드블록 + 표 inline-style 변환 테스트 (CodeWiz docInlineHtmlRender 산출 구조)</title>

<!--
  출처: CodeWiz docInlineHtmlRender(2-pass) 산출 inline-style HTML 구조 재현.
  목적: htmlToHwpx / htmlToDocx 변환기가 코드블록·표의 아래 3속성을 보존하는지 검증.
    (1) <pre> background-color (코드블록 배경 음영)
    (2) <pre> white-space: pre  (줄바꿈 보존 — 각 개행을 줄로 유지)
    (3) 내부 <span> inline color (Prism 구문강조 토큰색, GitHub one-light)
    (4) <table> th 배경(gray-200) + 셀 테두리(gray-400)
  색상 = prism-one-light 테마 토큰색을 inline화한 값(키워드 rgb(166,38,164) 보라 등).
-->
