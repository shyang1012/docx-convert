# Runs the build + unit test gate on PRs targeting main (and pushes to main).
# Mirrors the local deploy gate (npm run build && npm run test:unit). Example scripts
# (test:node/headings/ts) are manual/local only — they hit the network and are not a
# CI gate. [shyang 2026-06-22]

name: Test Pull Request

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # .npmrc min-release-age needs npm 11.10+
      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run build

      - run: npm run test:unit
